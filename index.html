<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titaeko | Pro Gallery</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#0b0b0b;
  color:white;
  scroll-behavior:smooth;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

/* SECTIONS */
section{
  min-height:100vh;
  padding:100px 20px;
}

/* ABOUT */
.aboutBox{
  background:#111;
  padding:20px;
  border-radius:12px;
}

/* PHOTO GRID */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.gallery img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:10px;
  display:block;
}

/* VIDEO GRID */
.videoGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

video{
  width:100%;
  border-radius:10px;
  display:block;
}

/* DIVIDER */
.space{
  height:60px;
}

/* HEADINGS */
h2{
  color:#00ffcc;
  margin-bottom:15px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>Titaeko</div>
  <div>
    <a href="#about">About</a>
    <a href="#photos">Photos</a>
    <a href="#videos">Editing</a>
  </div>
</nav>
