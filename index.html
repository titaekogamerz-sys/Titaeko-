<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titaeko | Pro Gallery</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#0b0b0b;
  color:white;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  background:rgba(0,0,0,0.8);
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

nav .logo{
  color:#00ffcc;
  font-weight:bold;
}

nav ul{
  display:flex;
  gap:15px;
  list-style:none;
}

nav ul li a{
  color:white;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,#000,#111,#00ffcc);
}

/* SECTIONS */
section{
  padding:80px 20px;
  text-align:center;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-top:25px;
}

.gallery img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:12px;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* VIDEO */
.videoBox{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  margin-top:25px;
}

video{
  width:100%;
  border-radius:12px;
}

/* SECTION TITLE */
h2{
  color:#00ffcc;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">Titaeko</div>
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#gallery">Gallery</a></li>
    <li><a href="#editing">Best Editing</a></li>
    <li><a href="#videos">Videos</a></li>
  </ul>
</nav>

<!-- HERO -->
<div class="hero" id="home">
  <div>
    <h1>Welcome to Titaeko</h1>
    <p>Minecraft • Editing • Creativity</p>
  </div>
</div>

<!-- ABOUT -->
<section id="about">
  <h2>About Me</h2>
  <p>Minecraft gamer & content creator</p>
</section>

<!-- PHOTO GALLERY -->
<section id="gallery">
  <h2>📸 My Gallery (Photos Only)</h2>

  <div class="gallery">
    <img src="1.jpg"><img src="2.jpg"><img src="3.jpg"><img src="4.jpg"><img src="5.jpg">
    <img src="6.jpg"><img src="7.jpg"><img src="8.jpg"><img src="9.jpg"><img src="10.jpg">
    <img src="11.jpg"><img src="12.jpg"><img src="13.jpg"><img src="14.jpg"><img src="15.jpg">
    <img src="16.jpg"><img src="17.jpg"><img src="18.jpg"><img src="19.jpg"><img src="20.jpg">
    <img src="21.jpg"><img src="22.jpg"><img src="23.jpg"><img src="24.jpg"><img src="25.jpg">
    <img src="26.jpg"><img src="27.jpg"><img src="28.jpg"><img src="29.jpg"><img src="30.jpg">
    <img src="31.jpg"><img src="32.jpg"><img src="33.jpg"><img src="34.jpg"><img src="35.jpg">
    <img src="36.jpg"><img src="37.jpg"><img src="38.jpg"><img src="39.jpg"><img src="40.jpg">
  </div>
</section>

<!-- BEST EDITING -->
<section id="editing">
  <h2>🔥 My Best Editing</h2>

  <div class="gallery">
    <img src="edit1.jpg">
    <img src="edit2.jpg">
    <img src="edit3.jpg">
    <img src="edit4.jpg">
  </div>
</section>

<!-- VIDEOS -->
<section id="videos">
  <h2>🎥 My Videos</h2>

  <div class="videoBox">
    <video controls>
      <source src="video1.mp4" type="video/mp4">
    </video>

    <video controls>
      <source src="video2.mp4" type="video/mp4">
    </video>
  </div>
</section>

</body>
</html>
