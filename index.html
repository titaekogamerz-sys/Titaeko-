<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAEKO | My Space</title>
    <style>
        /* Base Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0f172a; /* Dark Blue-Black */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Card */
        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        p {
            color: #94a3b8;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        .links {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #38bdf8;
            transform: scale(1.02);
        }

        .status {
            display: inline-block;
            margin-top: 20px;
            font-size: 0.8rem;
            background: #1e293b;
            padding: 5px 15px;
            border-radius: 20px;
            color: #38bdf8;
            border: 1px solid #38bdf8;
        }

        /* Background Animation */
        .bg-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #38bdf8;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="bg-blob" style="top: 10%; left: 10%;"></div>
    <div class="bg-blob" style="bottom: 10%; right: 10%;"></div>

    <div class="container">
        <h1>TITAEKO</h1>
        <p>A minimalist space for big ideas.</p>
        
        <div class="links">
            <a href="#" class="link-card">🚀 My Projects</a>
            <a href="#" class="link-card">✍️ Reading List</a>
            <a href="https://github.com/" class="link-card">💻 GitHub Profile</a>
        </div>

        <div class="status">Under Construction 🛠️</div>
    </div>

</body>
</html>
