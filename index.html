<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titaeko | Pro Gallery</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0b0b0b;
  color:white;
  scroll-behavior:smooth;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  color:#00ffcc;
  font-size:28px;
  letter-spacing:2px;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(10px);
  z-index:1000;
  border-bottom:1px solid rgba(0,255,204,0.2);
}

nav .logo{
  color:#00ffcc;
  font-weight:bold;
  font-size:20px;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 10px;
  font-size:14px;
}

nav a:hover{
  color:#00ffcc;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,#000,#111,#00ffcc);
}

.hero h1{
  font-size:50px;
}

.hero p{
  margin-top:10px;
  color:#ccc;
}

/* SECTIONS */
section{
  padding:80px 20px;
  text-align:center;
}

h2{
  color:#00ffcc;
  margin-bottom:10px;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-top:25px;
}

.gallery img{
  width:100%;
  height:240px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* VIDEO */
.videoBox{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  margin-top:20px;
}

video{
  width:100%;
  border-radius:12px;
}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}

#lightbox img{
  max-width:90%;
  max-height:85%;
  border-radius:12px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#050505;
  color:#777;
  border-top:1px solid rgba(0,255,204,0.2);
}

/* MOBILE */
@media(max-width:600px){
  .hero h1{
    font-size:35px;
  }

  nav{
    flex-direction:column;
    gap:10px;
  }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">Loading Titaeko...</div>

<!-- NAV -->
<nav>
  <div class="logo">Titaeko</div>
  <div>
    <a href="#home">Home</a>
    <a href="#gallery">Gallery</a>

© 2026 Titaeko | All Rights Reserved
</footer>

<script>
// loader
window.onload = () => {
  document.getElementById("loader").style.display = "none";
};

// open image
function openImg(src){
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightboxImg").src = src;
}

// close image
function closeImg(){
  document.getElementById("lightbox").style.display = "none";
}
</script>

</html>
